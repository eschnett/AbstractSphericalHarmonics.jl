name: CI

on:
  push:
    branches: [main, master]
    tags: ['*']
  pull_request:

# Cancel in-progress runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} / ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # See <https://julialang-s3.julialang.org/bin/versions.json> for available Julia versions
        include:
          - arch: "x64"
            os: "macOS-15-intel"
            version: "1.12"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.12"
          - arch: "x64"
            os: "windows-2025"
            version: "1.12"
          - arch: "arm64"
            os: "macOS-26"
            version: "1.12"
          - arch: "arm64"
            os: "ubuntu-24.04-arm"
            version: "1.12"
          - arch: "x86"
            os: "ubuntu-24.04"
            version: "1.12"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.11"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.10"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.9"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.8"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.7"
          - arch: "x64"
            os: "ubuntu-24.04"
            version: "1.6"

    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{matrix.arch}}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: eschnett/AbstractSphericalHarmonics.jl
